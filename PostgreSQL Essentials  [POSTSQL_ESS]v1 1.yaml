course:
  title: Base de datos PostgreSQL
  description: "Curso práctico de SQL usando el manejador de bases de datos Postgresql v18. Se expondrán los temas básicos de diseño, creación y modificación de bases de datos.\n Posteriormente se expondrán los conceptos básicos de la utilización del lenguaje SQL para la inserción, modificación, eliminación y consulta de los registros de la base de datos. \nTodo lo anterior usando ejemplos prácticos donde el participante podrá aplicar los conceptos vistos en clase."
  language: es
  level: intermediate
  audience:
  - Curso dirigido a personal que inicia su capacitación en el tema de las bases de datos relacionales.
  - Personal con conocimientos en otros manejadores de base de datos que desea explorar  Postgresql
  prerequisites:
  - Conocimientos básicos de informática
  - Computador con acceso a internet
  total_duration_minutes: 1260
  learning_outcomes:
  - Conocer los aspectos más relevantes de Postgresql como manejador de bases de datos.
  - Realizar el diseño de bases de datos de mediana complejidad.
  - Crear, modificar y eliminar bases de datos en Postgresql.
  - Realizar la inserción, actualización y borrado de registros.
  - Realizar consultas usando el lenguaje SQL
  hours_total: 21.0
  hours_theory: 6.3
  hours_practice: 14.7
